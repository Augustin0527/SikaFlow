name: mobile_money_control
description: "SikaFlow - Application de gestion des opérations Mobile Money au Bénin (MTN, Moov, Celtiis)."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  
  # State management
  provider: 6.1.5+1
  
  # Local storage
  hive: 2.2.3
  hive_flutter: 1.1.0
  shared_preferences: 2.5.3
  
  # HTTP
  http: 1.5.0
  
  # UI & Charts
  fl_chart: 0.69.0
  intl: 0.19.0
  
  # Icons
  cupertino_icons: ^1.0.8
  
  # UUID
  uuid: 4.5.1

  # WebView (paiement FedaPay)
  webview_flutter: 4.13.0

  # URL Launcher (liens email, téléphone, web)
  url_launcher: 6.3.1

  # Firebase
  firebase_core: 3.6.0
  firebase_auth: 5.3.1
  cloud_firestore: 5.4.3
  firebase_storage: 12.3.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  hive_generator: 2.0.1
  build_runner: 2.4.13

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/icons/
    - assets/logos/
