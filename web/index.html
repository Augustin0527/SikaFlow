<!DOCTYPE html>
<html lang="fr">
<head>
  <base href="/">
  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="SikaFlow — Système de gestion des opérations Mobile Money au Bénin">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="SikaFlow">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">
  <link rel="icon" type="image/png" href="icons/Icon-192.png"/>
  <title>SikaFlow — Gestion Mobile Money</title>
  <link rel="manifest" href="manifest.json">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; }
    body { background-color: #0A1628; }
    #loading {
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 20px;
      background-color: #0A1628;
      z-index: 9999;
      transition: opacity 0.4s ease;
    }
    #loading.hidden { opacity: 0; pointer-events: none; }
    .logo-wrap {
      width: 88px; height: 88px;
      background: #FFFFFF;
      border-radius: 22px;
      display: flex; align-items: center; justify-content: center;
      overflow: hidden;
      box-shadow: 0 8px 32px rgba(255,107,53,0.35);
      animation: pulse 2s ease-in-out infinite;
    }
    @keyframes pulse {
      0%,100% { box-shadow: 0 8px 32px rgba(255,107,53,0.30); }
      50%      { box-shadow: 0 8px 48px rgba(255,107,53,0.55); }
    }
    .logo-wrap img { width: 88px; height: 88px; object-fit: cover; border-radius: 22px; }
    .app-name { color: #FFFFFF; font-size: 28px; font-weight: 900; letter-spacing: 1px; }
    .sub { color: #8A9BB0; font-size: 13px; letter-spacing: 0.5px; }
    .spinner {
      width: 36px; height: 36px;
      border: 3px solid rgba(255,107,53,0.2);
      border-top-color: #FF6B35;
      border-radius: 50%;
      animation: spin 0.75s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div id="loading">
    <div class="logo-wrap">
      <img src="icons/Icon-192.png" alt="SikaFlow"
           onerror="this.style.display='none'">
    </div>
    <div class="app-name">SikaFlow</div>
    <div class="sub">Gestion Mobile Money</div>
    <div class="spinner"></div>
  </div>

  <script>
    // Supprimer tous les service workers et caches existants
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.getRegistrations().then(function(regs) {
        regs.forEach(function(r) { r.unregister(); });
      });
      if (window.caches) {
        caches.keys().then(function(keys) {
          keys.forEach(function(k) { caches.delete(k); });
        });
      }
    }

    window.addEventListener('flutter-first-frame', function() {
      var loading = document.getElementById('loading');
      if (loading) {
        loading.classList.add('hidden');
        setTimeout(function() { loading.style.display = 'none'; }, 500);
      }
    });
  </script>

  <script src="flutter.js" defer></script>
  <script>
    window.addEventListener('load', function() {
      // Charger Flutter SANS service worker
      _flutter.loader.load({
        // Pas de serviceWorkerSettings = service worker désactivé
        onEntrypointLoaded: async function(engineInitializer) {
          var appRunner = await engineInitializer.initializeEngine();
          await appRunner.runApp();
        }
      });
    });
  </script>
</body>
</html>
