<!DOCTYPE html>
<html>
<head>
  <base href="/">
  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="SikaFlow - Système de gestion des opérations Mobile Money au Bénin">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="SikaFlow">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">
  <link rel="icon" type="image/png" href="favicon.png"/>
  <title>SikaFlow — Système de gestion des opérations Mobile Money</title>
  <link rel="manifest" href="manifest.json">
  <style>
    body { margin: 0; background-color: #0A1628; }
    #loading-indicator {
      position: fixed; top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      text-align: center; color: #FF6B35;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    }
    #loading-indicator .spinner {
      width: 40px; height: 40px; margin: 0 auto 16px;
      border: 3px solid rgba(255,107,53,0.3);
      border-top-color: #FF6B35;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div id="loading-indicator">
    <div class="spinner"></div>
    <div>Chargement SikaFlow...</div>
  </div>

  <script>
    // Désactiver service workers et caches
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.getRegistrations().then(function(regs) {
        regs.forEach(function(r) { r.unregister(); });
      });
    }
    if ('caches' in window) {
      caches.keys().then(function(names) {
        names.forEach(function(n) { caches.delete(n); });
      });
    }
  </script>

  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
